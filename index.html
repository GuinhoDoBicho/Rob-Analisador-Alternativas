<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robô Analisador Das Alternativas Do Guinho</title>
    <style>
        /* Estética Robótica: Roxo e Azul */
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #00d4ff;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            user-select: none;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: rgba(10, 10, 25, 0.95);
            padding: 25px;
            border-radius: 20px;
            border: 2px solid #6a0dad;
            box-shadow: 0 0 30px rgba(106, 13, 173, 0.6);
        }

        h1 { color: #a200ff; font-size: 1.6em; text-shadow: 0 0 10px #6a0dad; }

        label { display: block; margin-top: 15px; font-weight: bold; font-size: 0.9em; }

        select, input, button {
            width: 100%;
            padding: 15px;
            margin: 8px 0;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            box-sizing: border-box;
        }

        select, input { background: #1a1a2e; color: #00d4ff; border: 1px solid #6a0dad; }

        button {
            background: #6a0dad;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #00d4ff; color: #000; }

        /* Animação de Análise */
        @keyframes pulsando {
            0% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.03); color: #ff00ff; }
            100% { opacity: 0.4; transform: scale(1); }
        }

        .analisando-txt {
            display: none;
            margin: 20px 0;
            font-weight: bold;
            animation: pulsando 1.5s infinite;
        }

        .resultado {
            background: #0f0c29;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            border: 1px solid #00d4ff;
            display: none;
            font-weight: bold;
        }

        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
        }

        footer { margin-top: 40px; font-size: 0.8em; opacity: 0.7; }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- Sistema de Acesso -->
    <div id="login-screen">
        <h2 style="color: #a200ff;">ACESSO AO ROBÔ</h2>
        <input type="password" id="senha-input" placeholder="DIGITE A SENHA" style="max-width:300px;">
        <button onclick="verificarAcesso()" style="width: 200px;">ENTRAR</button>
    </div>

    <div class="container">
        <h1>🤖 Robô Analisador Das Alternativas Do Guinho</h1>
        
        <label>1. Selecione a Loteria:</label>
        <select id="loteria-select" onchange="atualizarLimites()">
            <option value="lotinha">Lotinha</option>
            <option value="quininha">Quininha</option>
            <option value="seninha">Seninha</option>
            <option value="diadesortinha">Dia De Sortinha</option>
            <option value="lotomaniazia">Lotomaniazia</option>
        </select>

        <label id="label-qtd">2. Quantas dezenas quer analisar? (3 a 23):</label>
        <input type="number" id="qtd-dezenas" value="21" min="3" max="23">

        <button onclick="gerarAnalise()">ANALISAR</button>

        <div id="loading-text" class="analisando-txt">🔍 Analisando sorteios da loteria escolhida...</div>
        
        <div id="resultado-display" class="resultado"></div>
        
        <button id="btn-share" style="display:none; background:#00d4ff; color:#000;" onclick="fazerCompartilhamento()">Compartilhar Análise</button>
    </div>

    <footer>Criado por Guinho Lotofácil</footer>

    <script>
        // Bloqueios de segurança
        document.onkeydown = function(e) {
            if (e.keyCode == 123 || (e.ctrlKey && (e.shiftKey && e.keyCode == 73) || e.keyCode == 85)) return false;
        };

        // Memória de Dispositivo (Senha)
        if (localStorage.getItem("robo_acesso") === "concedido") {
            document.getElementById("login-screen").style.display = "none";
        }

        function verificarAcesso() {
            if (document.getElementById("senha-input").value === "ROBOANALISADORALTERNATIVA") {
                localStorage.setItem("robo_acesso", "concedido");
                document.getElementById("login-screen").style.display = "none";
            } else { alert("SENHA INCORRETA!"); }
        }

        // Função para atualizar os limites do INPUT de acordo com a loteria
        function atualizarLimites() {
            const escolha = document.getElementById("loteria-select").value;
            const inputQtd = document.getElementById("qtd-dezenas");
            const label = document.getElementById("label-qtd");

            const limites = {
                'lotinha': { min: 3, max: 23, def: 21 },
                'quininha': { min: 5, max: 45, def: 40 },
                'seninha': { min: 6, max: 40, def: 40 },
                'diadesortinha': { min: 7, max: 23, def: 20 },
                'lotomaniazia': { min: 20, max: 85, def: 80 }
            };

            const config = limites[escolha];
            inputQtd.min = config.min;
            inputQtd.max = config.max;
            inputQtd.value = config.def;
            label.innerText = `2. Quantas dezenas quer analisar? (${config.min} a ${config.max}):`;
        }

        // Gerador Determinístico (Fixo por dia)
        function obterNumeros(quantidade, maximo, minimo = 1) {
            const dataHoje = new Date().toLocaleDateString();
            let semente = 0;
            for (let i = 0; i < dataHoje.length; i++) { semente += dataHoje.charCodeAt(i); }

            let resultado = [];
            let contador = 0;
            while (resultado.length < quantidade) {
                let n = Math.floor(Math.abs(Math.sin(semente + contador + quantidade) * (maximo - minimo + 1))) + minimo;
                if (!resultado.includes(n)) { resultado.push(n); }
                contador++;
            }
            return resultado.sort((a, b) => a - b).join(" - ");
        }

        function gerarAnalise() {
            const qtdDesejada = parseInt(document.getElementById("qtd-dezenas").value);
            const inputQtd = document.getElementById("qtd-dezenas");

            // Validação de segurança para não ultrapassar os limites
            if (qtdDesejada < inputQtd.min || qtdDesejada > inputQtd.max) {
                alert(`Por favor, escolha entre ${inputQtd.min} e ${inputQtd.max} dezenas.`);
                return;
            }

            const loading = document.getElementById("loading-text");
            const display = document.getElementById("resultado-display");
            const shareBtn = document.getElementById("btn-share");
            
            display.style.display = "none";
            shareBtn.style.display = "none";
            loading.style.display = "block";

            // Tempo entre 8 e 10 segundos
            const tempoRandom = Math.floor(Math.random() * 2001) + 8000;

            setTimeout(() => {
                const escolha = document.getElementById("loteria-select").value;
                let textoFinal = "";

                // Aplica os limites de cada jogo conforme solicitado
                if (escolha === "lotinha") textoFinal = obterNumeros(qtdDesejada, 25);
                if (escolha === "quininha") textoFinal = obterNumeros(qtdDesejada, 80);
                if (escolha === "seninha") textoFinal = obterNumeros(qtdDesejada, 60);
                if (escolha === "diadesortinha") textoFinal = obterNumeros(qtdDesejada, 31);
                if (escolha === "lotomaniazia") textoFinal = obterNumeros(qtdDesejada, 99, 0);

                loading.style.display = "none";
                display.innerHTML = "<strong>DEZENAS ANALISADAS:</strong><br><br>" + textoFinal;
                display.style.display = "block";
                shareBtn.style.display = "block";
            }, tempoRandom);
        }

        function fazerCompartilhamento() {
            const dezenas = document.getElementById("resultado-display").innerText.replace("DEZENAS ANALISADAS:", "");
            const mensagem = "Análises feita pelo robô analisador viu que essas dezenas são as melhores para serem jogadas hoje:\n\n" + dezenas;

            if (navigator.share) {
                navigator.share({ title: 'Robô Analisador', text: mensagem });
            } else {
                navigator.clipboard.writeText(mensagem);
                alert("Copiado com sucesso!");
            }
        }
    </script>
</body>
</html>
