<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robô Analisador Das Alternativas Do Guinho</title>
    <style>
        /* TEMA ROBÓTICO AZUL E ROXO */
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #00d4ff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            user-select: none;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: rgba(10, 10, 25, 0.95);
            padding: 25px;
            border-radius: 20px;
            border: 2px solid #6a0dad;
            box-shadow: 0 0 30px rgba(106, 13, 173, 0.6);
        }

        h1 { color: #a200ff; font-size: 1.6em; text-shadow: 0 0 10px #6a0dad; margin-bottom: 20px; }

        label { display: block; margin-top: 15px; font-weight: bold; font-size: 0.9em; }

        select, input, button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            box-sizing: border-box;
        }

        select, input { background: #1a1a2e; color: #00d4ff; border: 1px solid #6a0dad; }

        button {
            background: #6a0dad;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #00d4ff; color: #000; }

        /* Animação de Carregamento */
        @keyframes pulsando {
            0% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.03); color: #ff00ff; }
            100% { opacity: 0.4; transform: scale(1); }
        }

        .analisando-txt {
            display: none;
            margin: 20px 0;
            font-weight: bold;
            animation: pulsando 1.5s infinite;
        }

        .resultado {
            background: #0f0c29;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            border: 1px solid #00d4ff;
            display: none;
            font-weight: bold;
        }

        /* TELA DE LOGIN / DEMO */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
        }

        .btn-comprar { background: #00d4ff; color: #000; font-size: 14px; margin-top: 20px; text-decoration: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 250px; display: block; }

        footer { margin-top: 40px; font-size: 0.8em; opacity: 0.7; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="login-screen">
        <h2 style="color: #a200ff;">🤖 ACESSO AO ROBÔ</h2>
        
        <input type="password" id="senha-input" placeholder="DIGITE A SENHA VITALÍCIA" style="max-width:300px;">
        <button onclick="verificarSenha()" style="width: 250px;">ENTRAR AGORA</button>
        
        <div id="demo-area" style="margin-top: 30px;">
            <p style="color: #888;">Ou use a versão de teste:</p>
            <button id="btn-teste" onclick="usarDemo()" style="width: 250px; background: #24243e; border: 1px solid #6a0dad;">TESTE GRÁTIS (3 USOS)</button>
            <div id="msg-bloqueio" style="display:none;">
                <p style="color: #ff00ff;">❌ Seus 3 acessos de teste acabaram!</p>
                <a href="https://mpago.la/1VizFTj" class="btn-comprar">COMPRAR ACESSO VITALÍCIO</a>
            </div>
        </div>
    </div>

    <div class="container">
        <h1>🤖 Robô Analisador Das Alternativas Do Guinho</h1>
        
        <label>1. Escolha a Loteria:</label>
        <select id="loteria-select" onchange="atualizarLimites()">
            <option value="lotinha">Lotinha</option>
            <option value="quininha">Quininha</option>
            <option value="seninha">Seninha</option>
            <option value="diadesortinha">Dia De Sortinha</option>
            <option value="lotomaniazia">Lotomaniazia</option>
        </select>

        <label id="label-qtd">2. Dezenas para analisar? (3 a 23):</label>
        <input type="number" id="qtd-dezenas" value="21" min="3" max="23">

        <button onclick="gerarAnalise()">SOLICITAR ANÁLISE</button>

        <div id="loading-text" class="analisando-txt">🔍 Analisando sorteios da loteria escolhida...</div>
        
        <div id="resultado-display" class="resultado"></div>
        
        <button id="btn-share" style="display:none; background:#00d4ff; color:#000;" onclick="fazerCompartilhamento()">Compartilhar Análise</button>
    </div>

    <footer>Criado por Guinho Lotofácil</footer>

    <script>
        // SEGURANÇA: Bloqueio de Inspeção
        document.onkeydown = function(e) {
            if (e.keyCode == 123 || (e.ctrlKey && (e.shiftKey && e.keyCode == 73) || e.keyCode == 85)) return false;
        };

        // GESTÃO DE ACESSOS
        const acessosDemoMax = 3;
        let modoDemoAtivo = false;

        function carregarStatus() {
            if (localStorage.getItem("acesso_vitalicio") === "OK") {
                document.getElementById("login-screen").style.display = "none";
                return;
            }

            let usados = parseInt(localStorage.getItem("usos_demo") || "0");
            const btnTeste = document.getElementById("btn-teste");
            const msgBloqueio = document.getElementById("msg-bloqueio");

            if (usados >= acessosDemoMax) {
                btnTeste.style.display = "none";
                msgBloqueio.style.display = "block";
            } else {
                btnTeste.innerText = `TESTE GRÁTIS (${acessosDemoMax - usados} RESTANTES)`;
            }
        }

        carregarStatus();

        function verificarSenha() {
            if (document.getElementById("senha-input").value === "ROBOANALISADORALTERNATIVA") {
                localStorage.setItem("acesso_vitalicio", "OK");
                document.getElementById("login-screen").style.display = "none";
            } else { alert("Senha incorreta!"); }
        }

        function usarDemo() {
            let usados = parseInt(localStorage.getItem("usos_demo") || "0");
            if (usados < acessosDemoMax) {
                modoDemoAtivo = true;
                document.getElementById("login-screen").style.display = "none";
                alert("Modo de Teste Ativado. Esta análise contará como um uso.");
            }
        }

        // LÓGICA DE LOTERIA E DEZENAS (Mantida conforme solicitado)
        function atualizarLimites() {
            const escolha = document.getElementById("loteria-select").value;
            const inputQtd = document.getElementById("qtd-dezenas");
            const label = document.getElementById("label-qtd");

            const configs = {
                'lotinha': { min: 3, max: 23, def: 21 },
                'quininha': { min: 5, max: 45, def: 40 },
                'seninha': { min: 6, max: 40, def: 40 },
                'diadesortinha': { min: 7, max: 23, def: 20 },
                'lotomaniazia': { min: 20, max: 85, def: 80 }
            };

            const c = configs[escolha];
            inputQtd.min = c.min; inputQtd.max = c.max; inputQtd.value = c.def;
            label.innerText = `2. Dezenas para analisar? (${c.min} a ${c.max}):`;
        }

        function obterNumeros(qtd, max, min = 1) {
            const hoje = new Date().toLocaleDateString();
            let seed = 0;
            for (let i = 0; i < hoje.length; i++) seed += hoje.charCodeAt(i);
            
            let res = [];
            let i = 0;
            while (res.length < qtd) {
                let n = Math.floor(Math.abs(Math.sin(seed + i + qtd) * (max - min + 1))) + min;
                if (!res.includes(n)) res.push(n);
                i++;
            }
            return res.sort((a, b) => a - b).join(" - ");
        }

        function gerarAnalise() {
            const qtd = parseInt(document.getElementById("qtd-dezenas").value);
            const input = document.getElementById("qtd-dezenas");

            if (qtd < input.min || qtd > input.max) {
                alert(`Escolha entre ${input.min} e ${input.max} dezenas.`);
                return;
            }

            // Se for demo, contabiliza o uso agora
            if (modoDemoAtivo) {
                let usados = parseInt(localStorage.getItem("usos_demo") || "0");
                localStorage.setItem("usos_demo", (usados + 1).toString());
                modoDemoAtivo = false; // Desativa flag para evitar contagem dupla
            }

            const loading = document.getElementById("loading-text");
            const display = document.getElementById("resultado-display");
            const shareBtn = document.getElementById("btn-share");
            
            display.style.display = "none";
            shareBtn.style.display = "none";
            loading.style.display = "block";

            const tempo = Math.floor(Math.random() * 2001) + 8000;

            setTimeout(() => {
                const tipo = document.getElementById("loteria-select").value;
                let dezenas = "";

                if (tipo === "lotinha") dezenas = obterNumeros(qtd, 25);
                if (tipo === "quininha") dezenas = obterNumeros(qtd, 80);
                if (tipo === "seninha") dezenas = obterNumeros(qtd, 60);
                if (tipo === "diadesortinha") dezenas = obterNumeros(qtd, 31);
                if (tipo === "lotomaniazia") dezenas = obterNumeros(qtd, 99, 0);

                loading.style.display = "none";
                display.innerHTML = "<strong>ANÁLISE DO DIA COMPLETA:</strong><br><br>" + dezenas;
                display.style.display = "block";
                shareBtn.style.display = "block";
                
                // Se o utilizador era demo, avisa que acabou após a análise
                let totalUsados = parseInt(localStorage.getItem("usos_demo"));
                if (totalUsados >= acessosDemoMax && localStorage.getItem("acesso_vitalicio") !== "OK") {
                    setTimeout(() => {
                        alert("Este foi seu último acesso de teste! Compre o acesso vitalício para continuar.");
                        location.reload();
                    }, 5000);
                }
            }, tempo);
        }

        function fazerCompartilhamento() {
            const dezenas = document.getElementById("resultado-display").innerText.replace("ANÁLISE DO DIA COMPLETA:", "");
            const mensagem = "Análises feita pelo robô analisador viu que essas dezenas são as melhores para serem jogadas hoje:\n\n" + dezenas;

            if (navigator.share) {
                navigator.share({ title: 'Robô Analisador', text: mensagem });
            } else {
                navigator.clipboard.writeText(mensagem);
                alert("Copiado com sucesso!");
            }
        }
    </script>
</body>
</html>
